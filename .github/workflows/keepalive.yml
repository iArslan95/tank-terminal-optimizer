name: Keep app awake

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours (UTC), with margin under the sleep window
  workflow_dispatch:         # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the keepalive script
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Playwright Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Open the app in a real browser session
        env:
          APP_URL: https://portopt-rotterdam.streamlit.app/
        run: python .github/keepalive.py
