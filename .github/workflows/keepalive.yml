name: Keep app awake

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (UTC) — well under Streamlit's sleep window
  workflow_dispatch:         # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the Streamlit app
        run: |
          url="https://portopt-rotterdam.streamlit.app/"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 90 "$url")
            echo "Attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 30
          done
          echo "No 200 after 3 attempts (the app may still have been woken)"
