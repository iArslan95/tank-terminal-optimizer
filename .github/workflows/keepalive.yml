name: Keep app awake

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (UTC) — well under Streamlit's sleep window
  workflow_dispatch:         # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the Streamlit app
        run: |
          url="https://portopt-rotterdam.streamlit.app/"
          ok=0
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 90 "$url" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 30
          done
          if [ "$ok" = "1" ]; then
            echo "App is awake (HTTP 200)."
          else
            echo "No HTTP 200 yet, but the request was sent so the wake may still be in progress."
          fi
